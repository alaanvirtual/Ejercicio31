<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ejercicio 4 - ¿Puede Votar?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #fff8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    .badge {
      display: inline-block;
      background: #faeeda;
      color: #854f0b;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    h1 { font-size: 1.3rem; font-weight: 600; color: #2e1a00; margin-bottom: 6px; }
    p { font-size: 13px; color: #777; margin-bottom: 1.5rem; }
    label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; margin-top: 12px; }
    input {
      width: 100%; padding: 10px 14px;
      font-size: 15px; border: 1.5px solid #e0e0e0;
      border-radius: 10px; outline: none;
      transition: border-color 0.2s; color: #2e1a00;
    }
    input:focus { border-color: #ef9f27; }
    button {
      margin-top: 16px; width: 100%;
      padding: 11px; font-size: 15px; font-weight: 600;
      background: #ba7517; color: #fff;
      border: none; border-radius: 10px;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #d4891e; }
    button:active { transform: scale(0.98); }
    .result {
      margin-top: 16px; padding: 16px;
      border-radius: 10px; display: none;
      font-size: 16px; font-weight: 600;
      text-align: center; line-height: 1.5;
    }
    .puede { background: #eaf3de; color: #3b6d11; border: 1.5px solid #97c459; }
    .no-puede { background: #fcebeb; color: #a32d2d; border: 1.5px solid #f09595; }
    .icono { font-size: 28px; margin-bottom: 6px; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Ejercicio 4</span>
    <h1>¿Puede Votar?</h1>
    <p>Verifica si una persona tiene la edad mínima para votar (18 años).</p>
    <label for="nombre">Nombre</label>
    <input type="text" id="nombre" placeholder="Ej: María" />
    <label for="edad">Edad</label>
    <input type="number" id="edad" placeholder="Ej: 25" min="0" />
    <button onclick="verificar()">Verificar</button>
    <div class="result" id="resultado">
      <span class="icono" id="icono"></span>
      <div id="texto"></div>
    </div>
  </div>

  <script>
    function verificar() {
      const nombre = document.getElementById('nombre').value.trim();
      const edad = parseInt(document.getElementById('edad').value);
      const res = document.getElementById('resultado');
      const texto = document.getElementById('texto');
      const icono = document.getElementById('icono');

      if (!nombre || isNaN(edad) || edad < 0) {
        alert('Por favor ingresa un nombre y una edad válida.');
        return;
      }

      res.style.display = 'block';
      if (edad >= 18) {
        res.className = 'result puede';
        icono.textContent = '✅';
        texto.textContent = `${nombre} puede votar.`;
      } else {
        res.className = 'result no-puede';
        icono.textContent = '❌';
        texto.textContent = `${nombre} no puede votar.`;
      }
    }

    document.querySelectorAll('input').forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') verificar(); });
    });
  </script>
</body>
</html>
